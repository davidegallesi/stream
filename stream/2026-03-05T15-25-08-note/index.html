<script>
  const toggle = document.getElementById('theme-toggle');
  const mq = window.matchMedia('(prefers-color-scheme: dark)');

  function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
  }

  // Toggle manuale: salva preferenza solo per questa sessione
  toggle.addEventListener('click', function() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next = isDark ? 'light' : 'dark';
    sessionStorage.setItem('theme-override', next);
    applyTheme(next);
  });

  // Segue sempre il sistema, a meno che l'utente non abbia scelto manualmente
  mq.addEventListener('change', function(e) {
    if (!sessionStorage.getItem('theme-override')) {
      applyTheme(e.matches ? 'dark' : 'light');
    }
  });
</script>
